name: Deploy Sun World

'on':
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      mode:
        description: Deployment mode
        required: true
        default: build-and-deploy
        type: choice
        options:
          - build-and-deploy
          - build-only
          - deploy-existing
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - api
      image_tag:
        description: Existing CCR image tag for deploy-existing, usually a commit SHA
        required: false
        type: string

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('deploy-sun-world-pr-{0}', github.event.pull_request.number) || 'deploy-sun-world-production' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TENCENT_CCR_REGISTRY: ${{ vars.TENCENT_CCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  FRONTEND_IMAGE_NAME: sun-world-frontend
  API_IMAGE_NAME: sun-world-api

jobs:
  quality:
    name: Format, checks, and unit tests
    if: github.event_name != 'workflow_dispatch' || inputs.mode != 'deploy-existing'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api

      - name: Check formatting
        env:
          PRETTIER_BASE_REF: ${{ github.event.before }}
        run: pnpm format:check

      - name: Check GitHub Actions protocols
        run: |
          pnpm check:github-actions:ci
          pnpm check:github-actions:deploy

      - name: Run frontend checks
        run: pnpm check:web

      - name: Run API checks
        run: pnpm check:api

      - name: Run UI package tests
        run: pnpm test:ui

      - name: Run contracts tests
        run: pnpm test:contracts

  detect-changes:
    name: Detect changed deploy targets
    needs: quality
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      web_changed: ${{ steps.detect.outputs.web_changed }}
      api_changed: ${{ steps.detect.outputs.api_changed }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
      build_needed: ${{ steps.detect.outputs.build_needed }}
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
      image_tag: ${{ steps.detect.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed deploy targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          web_changed=false
          api_changed=false
          build_needed=true
          deploy_needed=true
          image_tag=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ inputs.mode }}"
            target="${{ inputs.target }}"
            image_tag="${{ inputs.image_tag }}"

            case "$target" in
              all)
                web_changed=true
                api_changed=true
                ;;
              web)
                web_changed=true
                ;;
              api)
                api_changed=true
                ;;
              *)
                echo "Unsupported target: $target" >&2
                exit 1
                ;;
            esac

            case "$mode" in
              build-and-deploy)
                image_tag="${{ github.sha }}"
                ;;
              build-only)
                image_tag="${{ github.sha }}"
                deploy_needed=false
                ;;
              deploy-existing)
                build_needed=false
                if [ -z "$image_tag" ]; then
                  echo "image_tag is required when mode=deploy-existing." >&2
                  exit 1
                fi
                ;;
              *)
                echo "Unsupported mode: $mode" >&2
                exit 1
                ;;
            esac

            changed_files=".github/workflows/deploy.yml"
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            image_tag="$after"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse "$after^" >/dev/null 2>&1; then
                before="$after^"
                changed_files="$(git diff --name-only "$before" "$after")"
              else
                changed_files="$(git ls-tree -r --name-only "$after")"
              fi
            else
              changed_files="$(git diff --name-only "$before" "$after")"
            fi
          fi

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            case "$file" in
              .github/workflows/deploy.yml)
                # Workflow-only changes should validate the pipeline shape but
                # should not redeploy production images.
                ;;
              package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.json)
                web_changed=true
                api_changed=true
                ;;
              Dockerfile|apps/web/*|apps/web/**|packages/contracts/*|packages/contracts/**|packages/editor/*|packages/editor/**|packages/icons/*|packages/icons/**|packages/ui/*|packages/ui/**)
                web_changed=true
                ;;
              deploy/backend/*.md|deploy/backend/**/*.md|deploy/frontend/*|deploy/frontend/**|scripts/*|scripts/**)
                # Deployment docs and local verification scripts do not enter
                # the production images.
                ;;
              apps/api/*|apps/api/**|deploy/backend/*|deploy/backend/**)
                api_changed=true
                ;;
            esac
          done <<< "$changed_files"

          if [ "$web_changed" = "true" ] || [ "$api_changed" = "true" ]; then
            any_changed=true
          else
            any_changed=false
          fi

          {
            echo "web_changed=$web_changed"
            echo "api_changed=$api_changed"
            echo "any_changed=$any_changed"
            echo "build_needed=$build_needed"
            echo "deploy_needed=$deploy_needed"
            echo "image_tag=$image_tag"
          } >> "$GITHUB_OUTPUT"

          printf 'Changed files:\n%s\n' "$changed_files"
          printf 'web_changed=%s api_changed=%s any_changed=%s build_needed=%s deploy_needed=%s image_tag=%s\n' \
            "$web_changed" "$api_changed" "$any_changed" "$build_needed" "$deploy_needed" "$image_tag"

  build-web:
    name: Build and push frontend image
    needs: detect-changes
    if: needs.detect-changes.outputs.web_changed == 'true' && needs.detect-changes.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_image: ${{ steps.image-meta.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-changes.outputs.image_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api

      - name: Build frontend deployment artifacts
        run: |
          pnpm build:web
          pnpm build:web:manifest
          pnpm build:web:summary

      - name: Prepare build artifacts
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          deploy_image="${TENCENT_CCR_REGISTRY}/${{ vars.TENCENT_CCR_NAMESPACE }}/${FRONTEND_IMAGE_NAME}:${{ needs.detect-changes.outputs.image_tag }}"
          mkdir -p deploy-artifacts
          printf '%s\n' "${{ needs.detect-changes.outputs.image_tag }}" > deploy-artifacts/commit.txt
          printf '%s\n' "$deploy_image" > deploy-artifacts/image.txt
          cp apps/web/dist/build-manifest.json deploy-artifacts/build-manifest.json
          cp apps/web/dist/build-summary.json deploy-artifacts/build-summary.json
          echo "deploy_image=$deploy_image" >> "$GITHUB_OUTPUT"

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ needs.detect-changes.outputs.image_tag }}
          path: apps/web/dist
          retention-days: 30

      - name: Upload frontend deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deploy-metadata-${{ needs.detect-changes.outputs.image_tag }}
          path: deploy-artifacts
          retention-days: 30

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent CCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TENCENT_CCR_REGISTRY }}
          username: ${{ vars.TENCENT_CCR_USERNAME }}
          password: ${{ secrets.TENCENT_CCR_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image-meta.outputs.deploy_image }}
          cache-from: type=registry,ref=${{ env.TENCENT_CCR_REGISTRY }}/${{ vars.TENCENT_CCR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.TENCENT_CCR_REGISTRY }}/${{ vars.TENCENT_CCR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL || 'https://api.sunworld.site' }}
            VITE_TELEMETRY_ENDPOINT=${{ vars.VITE_TELEMETRY_ENDPOINT || 'https://api.sunworld.site/telemetry/events' }}

  build-api:
    name: Build and push API image
    needs: detect-changes
    if: needs.detect-changes.outputs.api_changed == 'true' && needs.detect-changes.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deploy_image: ${{ steps.image-meta.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-changes.outputs.image_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api

      - name: Prepare API deploy artifacts
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          deploy_image="${TENCENT_CCR_REGISTRY}/${{ vars.TENCENT_CCR_NAMESPACE }}/${API_IMAGE_NAME}:${{ needs.detect-changes.outputs.image_tag }}"
          mkdir -p api-deploy-artifacts
          printf '%s\n' "${{ needs.detect-changes.outputs.image_tag }}" > api-deploy-artifacts/commit.txt
          printf '%s\n' "$deploy_image" > api-deploy-artifacts/image.txt
          echo "deploy_image=$deploy_image" >> "$GITHUB_OUTPUT"

      - name: Upload API deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-deploy-metadata-${{ needs.detect-changes.outputs.image_tag }}
          path: api-deploy-artifacts
          retention-days: 30

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent CCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TENCENT_CCR_REGISTRY }}
          username: ${{ vars.TENCENT_CCR_USERNAME }}
          password: ${{ secrets.TENCENT_CCR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.image-meta.outputs.deploy_image }}
          cache-from: type=registry,ref=${{ env.TENCENT_CCR_REGISTRY }}/${{ vars.TENCENT_CCR_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:buildcache
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=sun-world-api

  deploy:
    name: Deploy changed CCR images on Lighthouse
    needs:
      - detect-changes
      - build-web
      - build-api
    if: |
      always() &&
      needs.detect-changes.outputs.any_changed == 'true' &&
      needs.detect-changes.outputs.deploy_needed == 'true' &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped') &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Prepare SSH
        env:
          LIGHTHOUSE_HOST: ${{ vars.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_PORT: ${{ vars.LIGHTHOUSE_PORT || '22' }}
          LIGHTHOUSE_SSH_KEY: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$LIGHTHOUSE_SSH_KEY" > ~/.ssh/sun_world_deploy_key
          chmod 600 ~/.ssh/sun_world_deploy_key
          ssh-keyscan -p "$LIGHTHOUSE_PORT" "$LIGHTHOUSE_HOST" >> ~/.ssh/known_hosts

      - name: Pull images and deploy on Lighthouse
        env:
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web_changed }}
          API_CHANGED: ${{ needs.detect-changes.outputs.api_changed }}
          FRONTEND_IMAGE: ${{ env.TENCENT_CCR_REGISTRY }}/${{ vars.TENCENT_CCR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.detect-changes.outputs.image_tag }}
          API_IMAGE: ${{ env.TENCENT_CCR_REGISTRY }}/${{ vars.TENCENT_CCR_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:${{ needs.detect-changes.outputs.image_tag }}
          LIGHTHOUSE_HOST: ${{ vars.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ vars.LIGHTHOUSE_USER }}
          LIGHTHOUSE_PORT: ${{ vars.LIGHTHOUSE_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sun_world_deploy_key -p "$LIGHTHOUSE_PORT" \
            "$LIGHTHOUSE_USER@$LIGHTHOUSE_HOST" 'bash -s' -- \
            "$WEB_CHANGED" "$API_CHANGED" "$FRONTEND_IMAGE" "$API_IMAGE" <<'REMOTE'
          set -euo pipefail
          WEB_CHANGED="$1"
          API_CHANGED="$2"
          FRONTEND_IMAGE="$3"
          API_IMAGE="$4"

          if [ "$WEB_CHANGED" = "true" ]; then
            sudo docker pull "$FRONTEND_IMAGE"
            sudo docker rm -f my-frontend || true
            sudo docker run -d --restart unless-stopped --name my-frontend -p 8081:80 "$FRONTEND_IMAGE"
          else
            echo "No frontend deploy needed."
          fi

          if [ "$API_CHANGED" = "true" ]; then
            sudo docker pull "$API_IMAGE"
            API_MOUNTS=(
              -v /home/lighthouse/.config/blog_end:/home/lighthouse/.config/blog_end:ro
            )
            if [ -d /home/lighthouse/blog/blog_end/src/conf ]; then
              API_MOUNTS+=(
                -v /home/lighthouse/blog/blog_end/src/conf:/app/src/conf:ro
              )
            fi
            sudo docker run --rm --network host \
              "${API_MOUNTS[@]}" \
              "$API_IMAGE" /bin/sh -lc 'set -euo pipefail; set -a; . /home/lighthouse/.config/blog_end/auth.env; set +a; python -m src.database.mysql.schema_migration --mode apply'
          else
            echo "No API schema apply needed."
          fi

          sudo docker image prune -f
          curl -fsSI https://sunworld.site
          curl -fsSI https://www.sunworld.site
          REMOTE

  no-deploy:
    name: No production deploy
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'false' || needs.detect-changes.outputs.deploy_needed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip deploy
        run: echo "No production deploy will run for this workflow."
