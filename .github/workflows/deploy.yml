name: Deploy Sun World

'on':
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FRONTEND_IMAGE_NAME: sun-world-frontend
  API_IMAGE_NAME: sun-world-api

jobs:
  detect-changes:
    name: Detect changed deploy targets
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      web_changed: ${{ steps.detect.outputs.web_changed }}
      api_changed: ${{ steps.detect.outputs.api_changed }}
      any_changed: ${{ steps.detect.outputs.any_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed deploy targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          web_changed=false
          api_changed=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            web_changed=true
            api_changed=true
            changed_files=".github/workflows/deploy.yml"
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse "$after^" >/dev/null 2>&1; then
                before="$after^"
                changed_files="$(git diff --name-only "$before" "$after")"
              else
                changed_files="$(git ls-tree -r --name-only "$after")"
              fi
            else
              changed_files="$(git diff --name-only "$before" "$after")"
            fi
          fi

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            case "$file" in
              .github/workflows/deploy.yml|.github/workflows/ci.yml)
                # Workflow-only changes should validate the pipeline shape but
                # should not redeploy production images.
                ;;
              package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.json)
                web_changed=true
                api_changed=true
                ;;
              Dockerfile|apps/web/*|apps/web/**|packages/contracts/*|packages/contracts/**|packages/editor/*|packages/editor/**|packages/icons/*|packages/icons/**|packages/ui/*|packages/ui/**)
                web_changed=true
                ;;
              apps/api/*|apps/api/**|deploy/backend/*|deploy/backend/**)
                api_changed=true
                ;;
              deploy/frontend/*|deploy/frontend/**|scripts/*|scripts/**)
                # Deployment docs and local verification scripts do not enter
                # the production images.
                ;;
            esac
          done <<< "$changed_files"

          if [ "$web_changed" = "true" ] || [ "$api_changed" = "true" ]; then
            any_changed=true
          else
            any_changed=false
          fi

          {
            echo "web_changed=$web_changed"
            echo "api_changed=$api_changed"
            echo "any_changed=$any_changed"
          } >> "$GITHUB_OUTPUT"

          printf 'Changed files:\n%s\n' "$changed_files"
          printf 'web_changed=%s api_changed=%s any_changed=%s\n' \
            "$web_changed" "$api_changed" "$any_changed"

  build-web:
    name: Build frontend image artifact
    needs: detect-changes
    if: needs.detect-changes.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      deploy_image: ${{ steps.image-meta.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api

      - name: Run frontend checks
        run: pnpm check:web

      - name: Prepare build artifacts
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          deploy_image="${FRONTEND_IMAGE_NAME}:${{ github.sha }}"
          mkdir -p deploy-artifacts
          printf '%s\n' "${{ github.sha }}" > deploy-artifacts/commit.txt
          printf '%s\n' "$deploy_image" > deploy-artifacts/image.txt
          cp apps/web/dist/build-manifest.json deploy-artifacts/build-manifest.json
          cp apps/web/dist/build-summary.json deploy-artifacts/build-summary.json
          echo "deploy_image=$deploy_image" >> "$GITHUB_OUTPUT"

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: apps/web/dist
          retention-days: 30

      - name: Upload frontend deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deploy-metadata-${{ github.sha }}
          path: deploy-artifacts
          retention-days: 30

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ steps.image-meta.outputs.deploy_image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL || 'https://api.sunworld.site' }}
            VITE_TELEMETRY_ENDPOINT=${{ vars.VITE_TELEMETRY_ENDPOINT || 'https://api.sunworld.site/telemetry/events' }}

      - name: Save frontend image artifact
        shell: bash
        run: |
          set -euo pipefail
          docker save "${{ steps.image-meta.outputs.deploy_image }}" | gzip > deploy-artifacts/frontend-image.tar.gz

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image-${{ github.sha }}
          path: deploy-artifacts/frontend-image.tar.gz
          retention-days: 30

  build-api:
    name: Build API image artifact
    needs: detect-changes
    if: needs.detect-changes.outputs.api_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      deploy_image: ${{ steps.image-meta.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api

      - name: Run API checks
        run: pnpm check:api

      - name: Prepare API deploy artifacts
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          deploy_image="${API_IMAGE_NAME}:${{ github.sha }}"
          mkdir -p api-deploy-artifacts
          printf '%s\n' "${{ github.sha }}" > api-deploy-artifacts/commit.txt
          printf '%s\n' "$deploy_image" > api-deploy-artifacts/image.txt
          echo "deploy_image=$deploy_image" >> "$GITHUB_OUTPUT"

      - name: Upload API deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-deploy-metadata-${{ github.sha }}
          path: api-deploy-artifacts
          retention-days: 30

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image locally
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          load: true
          tags: ${{ steps.image-meta.outputs.deploy_image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=sun-world-api

      - name: Save API image artifact
        shell: bash
        run: |
          set -euo pipefail
          docker save "${{ steps.image-meta.outputs.deploy_image }}" | gzip > api-deploy-artifacts/api-image.tar.gz

      - name: Upload API image artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-image-${{ github.sha }}
          path: api-deploy-artifacts/api-image.tar.gz
          retention-days: 30

  deploy:
    name: Deploy changed image artifacts on Lighthouse
    needs:
      - detect-changes
      - build-web
      - build-api
    if: |
      always() &&
      needs.detect-changes.outputs.any_changed == 'true' &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped') &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Download frontend image artifact
        if: needs.detect-changes.outputs.web_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-image-${{ github.sha }}
          path: deploy-images

      - name: Download API image artifact
        if: needs.detect-changes.outputs.api_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: api-image-${{ github.sha }}
          path: deploy-images

      - name: Prepare SSH
        env:
          LIGHTHOUSE_HOST: ${{ vars.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_PORT: ${{ vars.LIGHTHOUSE_PORT || '22' }}
          LIGHTHOUSE_SSH_KEY: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$LIGHTHOUSE_SSH_KEY" > ~/.ssh/sun_world_deploy_key
          chmod 600 ~/.ssh/sun_world_deploy_key
          ssh-keyscan -p "$LIGHTHOUSE_PORT" "$LIGHTHOUSE_HOST" >> ~/.ssh/known_hosts

      - name: Upload changed image archives
        env:
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web_changed }}
          API_CHANGED: ${{ needs.detect-changes.outputs.api_changed }}
          LIGHTHOUSE_HOST: ${{ vars.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ vars.LIGHTHOUSE_USER }}
          LIGHTHOUSE_PORT: ${{ vars.LIGHTHOUSE_PORT || '22' }}
          REMOTE_RELEASE_DIR: /tmp/sun-world-deploy-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sun_world_deploy_key -p "$LIGHTHOUSE_PORT" \
            "$LIGHTHOUSE_USER@$LIGHTHOUSE_HOST" "mkdir -p '$REMOTE_RELEASE_DIR'"

          if [ "$WEB_CHANGED" = "true" ]; then
            scp -i ~/.ssh/sun_world_deploy_key -P "$LIGHTHOUSE_PORT" \
              deploy-images/frontend-image.tar.gz \
              "$LIGHTHOUSE_USER@$LIGHTHOUSE_HOST:$REMOTE_RELEASE_DIR/frontend-image.tar.gz"
          fi

          if [ "$API_CHANGED" = "true" ]; then
            scp -i ~/.ssh/sun_world_deploy_key -P "$LIGHTHOUSE_PORT" \
              deploy-images/api-image.tar.gz \
              "$LIGHTHOUSE_USER@$LIGHTHOUSE_HOST:$REMOTE_RELEASE_DIR/api-image.tar.gz"
          fi

      - name: Load images and deploy on Lighthouse
        env:
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web_changed }}
          API_CHANGED: ${{ needs.detect-changes.outputs.api_changed }}
          FRONTEND_IMAGE: ${{ needs.build-web.outputs.deploy_image }}
          API_IMAGE: ${{ needs.build-api.outputs.deploy_image }}
          LIGHTHOUSE_HOST: ${{ vars.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ vars.LIGHTHOUSE_USER }}
          LIGHTHOUSE_PORT: ${{ vars.LIGHTHOUSE_PORT || '22' }}
          REMOTE_RELEASE_DIR: /tmp/sun-world-deploy-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sun_world_deploy_key -p "$LIGHTHOUSE_PORT" \
            "$LIGHTHOUSE_USER@$LIGHTHOUSE_HOST" 'bash -s' -- \
            "$WEB_CHANGED" "$API_CHANGED" "$FRONTEND_IMAGE" "$API_IMAGE" "$REMOTE_RELEASE_DIR" <<'REMOTE'
          set -euo pipefail
          WEB_CHANGED="$1"
          API_CHANGED="$2"
          FRONTEND_IMAGE="$3"
          API_IMAGE="$4"
          REMOTE_RELEASE_DIR="$5"

          if [ "$WEB_CHANGED" = "true" ]; then
            sudo docker load -i "$REMOTE_RELEASE_DIR/frontend-image.tar.gz"
            sudo docker rm -f my-frontend || true
            sudo docker run -d --restart unless-stopped --name my-frontend -p 8081:80 "$FRONTEND_IMAGE"
          else
            echo "No frontend deploy needed."
          fi

          if [ "$API_CHANGED" = "true" ]; then
            sudo docker load -i "$REMOTE_RELEASE_DIR/api-image.tar.gz"
            sudo docker run --rm --network host \
              -v /home/lighthouse/.config/blog_end/auth.env:/run/blog_end/auth.env:ro \
              "$API_IMAGE" /bin/sh -lc 'set -euo pipefail; set -a; . /run/blog_end/auth.env; set +a; python -m src.database.mysql.schema_migration --mode apply'
          else
            echo "No API schema apply needed."
          fi

          rm -rf "$REMOTE_RELEASE_DIR"
          sudo docker image prune -f
          curl -fsSI https://sunworld.site
          curl -fsSI https://www.sunworld.site
          REMOTE

  no-deploy:
    name: No deployable changes
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip deploy
        run: echo "No frontend or API deployable changes detected."
