name: CI

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, checks, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api

      - name: Check formatting
        env:
          PRETTIER_BASE_REF: ${{ github.event.before }}
        run: pnpm format:check

      - name: Check GitHub Actions protocols
        run: |
          pnpm check:github-actions:ci
          pnpm check:github-actions:deploy

      - name: Run frontend checks
        run: pnpm check:web

      - name: Run API checks
        run: pnpm check:api

      - name: Run UI package tests
        run: pnpm test:ui

      - name: Run contracts tests
        run: pnpm test:contracts
