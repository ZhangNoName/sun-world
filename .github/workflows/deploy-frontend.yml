name: Deploy Frontend

"on":
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FRONTEND_IMAGE_NAME: ghcr.io/zhangnoname/sun-world-frontend
  API_IMAGE_NAME: ghcr.io/zhangnoname/sun-world-api

jobs:
  build-push-deploy:
    name: Build, push, and deploy frontend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api

      - name: Run frontend checks
        run: pnpm check:web

      - name: Prepare build artifacts
        run: |
          mkdir -p deploy-artifacts
          printf '%s\n' "${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}" > deploy-artifacts/image.txt
          printf '%s\n' "${{ github.sha }}" > deploy-artifacts/commit.txt
          cp apps/web/dist/build-manifest.json deploy-artifacts/build-manifest.json
          cp apps/web/dist/build-summary.json deploy-artifacts/build-summary.json

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: apps/web/dist
          retention-days: 30

      - name: Upload deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deploy-metadata-${{ github.sha }}
          path: deploy-artifacts
          retention-days: 30

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL || 'https://api.sunworld.site' }}
            VITE_TELEMETRY_ENDPOINT=${{ vars.VITE_TELEMETRY_ENDPOINT || 'https://api.sunworld.site/telemetry/events' }}

      - name: Run API checks
        run: pnpm check:api

      - name: Prepare API deploy artifacts
        run: |
          mkdir -p api-deploy-artifacts
          printf '%s\n' "${{ env.API_IMAGE_NAME }}:${{ github.sha }}" > api-deploy-artifacts/image.txt
          printf '%s\n' "${{ github.sha }}" > api-deploy-artifacts/commit.txt

      - name: Upload API deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-deploy-metadata-${{ github.sha }}
          path: api-deploy-artifacts
          retention-days: 30

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.API_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=sun-world-api

      - name: Deploy frontend and apply API schema on Lighthouse
        uses: appleboy/ssh-action@v1
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          API_IMAGE: ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
        with:
          host: ${{ vars.LIGHTHOUSE_HOST }}
          username: ${{ vars.LIGHTHOUSE_USER }}
          key: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
          port: ${{ vars.LIGHTHOUSE_PORT || '22' }}
          envs: FRONTEND_IMAGE,API_IMAGE
          command_timeout: 30m
          script: |
            set -euo pipefail
            sudo docker pull "$FRONTEND_IMAGE"
            sudo docker rm -f my-frontend || true
            sudo docker run -d --restart unless-stopped --name my-frontend -p 8081:80 "$FRONTEND_IMAGE"
            sudo docker pull "$API_IMAGE"
            sudo docker run --rm --network host \
              -v /home/lighthouse/.config/blog_end/auth.env:/run/blog_end/auth.env:ro \
              "$API_IMAGE" /bin/sh -lc 'set -euo pipefail; set -a; . /run/blog_end/auth.env; set +a; python -m src.database.mysql.schema_migration --mode apply'
            sudo docker image prune -f
            curl -fsSI https://sunworld.site
            curl -fsSI https://www.sunworld.site
