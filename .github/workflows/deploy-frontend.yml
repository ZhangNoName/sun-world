name: Deploy Frontend

"on":
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/zhangnoname/sun-world-frontend

jobs:
  build-push-deploy:
    name: Build, push, and deploy frontend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Prepare build artifacts
        run: |
          mkdir -p deploy-artifacts
          printf '%s\n' "${{ env.IMAGE_NAME }}:${{ github.sha }}" > deploy-artifacts/image.txt
          printf '%s\n' "${{ github.sha }}" > deploy-artifacts/commit.txt

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: packages/blog/dist
          retention-days: 30

      - name: Upload deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deploy-metadata-${{ github.sha }}
          path: deploy-artifacts
          retention-days: 30

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend on Lighthouse
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        with:
          host: ${{ vars.LIGHTHOUSE_HOST }}
          username: ${{ vars.LIGHTHOUSE_USER }}
          key: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
          port: ${{ vars.LIGHTHOUSE_PORT || '22' }}
          envs: IMAGE
          command_timeout: 30m
          script: |
            set -euo pipefail
            sudo docker pull "$IMAGE"
            sudo docker rm -f my-frontend || true
            sudo docker run -d --restart unless-stopped --name my-frontend -p 8081:80 "$IMAGE"
            sudo docker image prune -f
            curl -fsSI https://sunworld.site
            curl -fsSI https://www.sunworld.site
