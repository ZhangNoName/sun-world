name: sun-world

services:
  frontend:
    image: blog-front:latest
    container_name: my-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-https://api.sunworld.site}
        VITE_TELEMETRY_ENDPOINT: ${VITE_TELEMETRY_ENDPOINT:-https://api.sunworld.site/telemetry/events}
    ports:
      - '8081:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    profiles:
      - api
    image: sun-world-api:latest
    container_name: sun-world-api
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PORT: '8000'
      BLOG_SECRET_ENV_FILE: /home/lighthouse/.config/blog_end/auth.env
    volumes:
      - type: bind
        source: ${BLOG_API_SECRET_DIR:-/home/lighthouse/.config/blog_end}
        target: /home/lighthouse/.config/blog_end
        read_only: true
      - type: bind
        source: ${BLOG_API_CONFIG_DIR:-/home/lighthouse/blog/blog_end/src/conf}
        target: /app/src/conf
        read_only: true
      - type: bind
        source: ${BLOG_API_DATA_DIR:-/data/blog}
        target: /data/blog
    ports:
      - '127.0.0.1:${BLOG_API_HOST_PORT:-18000}:8000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/healthz'', timeout=3).read()"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
